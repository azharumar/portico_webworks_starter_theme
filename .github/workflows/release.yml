name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create theme ZIP
        run: |
          THEME_SLUG="portico_webworks_theme"
          mkdir -p "build/$THEME_SLUG"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.cursor' \
            --exclude='.gitignore' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='*.zip' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='*Company Brief*' \
            --exclude='build' \
            ./ "build/$THEME_SLUG/"
          cd build && zip -r "../$THEME_SLUG.zip" "$THEME_SLUG"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: portico_webworks_theme.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
